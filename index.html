<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>💌 A message for you</title>
  <style>
    body{font-family:Arial;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#f6f2ff;margin:0}
    .card{background:white;padding:28px;border-radius:18px;max-width:520px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.12)}
    h1{margin:0 0 12px}
    p{font-size:18px;line-height:1.5}
    .btn{display:inline-block;padding:12px 18px;border-radius:12px;text-decoration:none;margin:8px;font-weight:700}
    .yes{background:#6d28d9;color:white}
    .no{background:#e5e7eb;color:#111827}
  </style>
</head>
<body>
  <div class="card">
    <h1>Hey 😊</h1>
    <p>
      I just wanted to ask something in a simple way…<br/>
      do u really belive me💜
    </p>

    <!-- Change the number and message -->
    <a class="btn yes" href="https://wa.me/949792166?text=Hey%20😊%20I%20saw%20your%20page%20and%20my%20answer%20is%3A%20Yes%20💜" target="_blank">
      Yes 💜
    </a>

    <a class="btn no" href="https://wa.me/94769792166?text=Hey%20😊%20Thank%20you%20for%20asking.%20I%20prefer%20to%20say%20no%20🙏" target="_blank">
      No 🙏
    </a>

    <p style="font-size:13px;opacity:.75;margin-top:14px">Made with honesty ✨</p>
  </div>
</body>
</html>
