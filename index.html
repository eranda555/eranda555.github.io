<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>💌 A message for you</title>

  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg,#f6f2ff,#ffe6f1);
      overflow:hidden;
    }

    /* Floating hearts */
    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    .heart{
      position:absolute;
      bottom:-30px;
      font-size:18px;
      animation: floatUp linear infinite;
      opacity:0;
    }
    @keyframes floatUp{
      0%{transform:translateY(0);opacity:0}
      10%{opacity:1}
      100%{transform:translateY(-120vh);opacity:0}
    }

    .card{
      position:relative;
      z-index:1;
      background:white;
      max-width:520px;
      width:95%;
      padding:24px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.2);
    }

    .main-pic{
      width:100%;
      max-height:420px;
      object-fit:contain;
      border-radius:16px;
      background:#f3efff;
      margin-bottom:14px;
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }

    .bag{
      width:52px;
      height:52px;
      margin:0 auto 8px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#eee6ff;
    }

    h1{
      margin:6px 0 8px;
      font-size:28px;
    }

    p{
      font-size:17px;
      color:#555;
      line-height:1.5;
    }

    .btns{
      margin-top:14px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      padding:12px 18px;
      border-radius:14px;
      text-decoration:none;
      font-weight:bold;
      min-width:150px;
      transition:.15s;
    }

    .yes{
      background:#6d28d9;
      color:white;
      box-shadow:0 10px 24px rgba(109,40,217,.4);
    }

    .no{
      background:#e5e7eb;
      color:#111827;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .footer{
      margin-top:14px;
      font-size:13px;
      opacity:.7;
    }
  </style>
</head>

<body>

  <!-- Floating hearts -->
  <div class="hearts" id="hearts"></div>

  <div class="card">

    <!-- YOUR IMAGE -->
    <img src="pic1.jpeg" alt="special moment" class="main-pic">

    <!-- Bag icon -->
    <div class="bag">🎒</div>

    <h1>Hey 😊</h1>

    <p>
      I just wanted to ask something in a simple way…<br>
      <strong>Do you really believe in me?</strong> 💜
    </p>

    <div class="btns">
      <!-- WhatsApp number: 0769792166 -->
      <a class="btn yes"
         href="https://wa.me/94769792166?text=Hey%20😊%20I%20saw%20your%20page%20and%20my%20answer%20is%3A%20Yes%20💜"
         target="_blank">
        Yes 💜
      </a>

      <a class="btn no"
         href="https://wa.me/94769792166?text=Hey%20😊%20Thank%20you%20for%20asking.%20I%20prefer%20to%20say%20no%20🙏"
         target="_blank">
        No 🙏
      </a>
    </div>

    <div class="footer">Made with honesty ✨</div>
  </div>

  <script>
    const hearts = document.getElementById("hearts");
    const emojis = ["💜","💕","💗","💖","❤️"];
    for(let i=0;i<20;i++){
      const h=document.createElement("div");
      h.className="heart";
      h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left=Math.random()*100+"vw";
      h.style.fontSize=14+Math.random()*20+"px";
      h.style.animationDuration=6+Math.random()*8+"s";
      h.style.animationDelay=Math.random()*5+"s";
      hearts.appendChild(h);
    }
  </script>

</body>
</html>
